# .github/dependabot.yml
version: 2

# Configuração para acessar nosso registro privado
registries:
  github-packages:
    type: npm-registry
    url: https://registry.npmjs.org/
    token: ${{secrets.DEPENDABOT_PAT}} # Variável que vamos configurar no Passo 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily" # Pode ser "daily" ou "monthly"
    registries:
      - npm-registry # Diz ao Dependabot para usar a configuração acima